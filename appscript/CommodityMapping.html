<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      :root {
        --bg: #f6f1e8;
        --panel: #fffaf2;
        --ink: #1d2320;
        --muted: #616b64;
        --line: #dbd2c2;
        --accent: #256d45;
        --accent-strong: #1d5636;
        --accent-soft: #e5f2e9;
        --warn: #b45309;
        --shadow: 0 18px 40px rgba(48, 42, 31, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 16px;
        font-family: "Segoe UI", Arial, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(213, 142, 39, 0.18), transparent 26%),
          linear-gradient(180deg, #faf5ec, var(--bg));
      }

      .shell {
        display: grid;
        gap: 14px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 16px;
        box-shadow: var(--shadow);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.45;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .stat {
        padding: 12px;
        border-radius: 14px;
        background: #fffdf8;
        border: 1px solid var(--line);
      }

      .stat-label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
      }

      .stat-value {
        margin-top: 6px;
        font-size: 24px;
        font-weight: 700;
        color: var(--accent-strong);
      }

      .toolbar {
        display: grid;
        gap: 10px;
      }

      input[type="search"] {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: #fffdf8;
        font: inherit;
      }

      .buttons {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 11px 16px;
        background: var(--accent);
        color: white;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      button.secondary {
        background: #fffdf8;
        color: var(--accent-strong);
        border: 1px solid var(--line);
      }

      button:disabled {
        opacity: 0.6;
        cursor: wait;
      }

      .table-wrap {
        max-height: 420px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 16px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: #fffdf8;
      }

      thead th {
        position: sticky;
        top: 0;
        background: #f3ebde;
        z-index: 1;
      }

      th, td {
        text-align: left;
        padding: 12px;
        border-bottom: 1px solid #eee4d4;
        vertical-align: middle;
      }

      td select {
        width: 100%;
        padding: 9px 10px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: white;
      }

      .badge {
        display: inline-flex;
        padding: 6px 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent-strong);
        font-size: 12px;
        font-weight: 600;
      }

      .status {
        min-height: 42px;
        padding: 12px 14px;
        border-radius: 14px;
        background: #f2ebdf;
        color: var(--ink);
        white-space: pre-wrap;
      }

      .status.warn {
        color: var(--warn);
        background: #fef3c7;
      }

      .status.success {
        color: var(--accent-strong);
        background: #e7f5eb;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="card">
        <h1>Commodity Mapping</h1>
        <p>Maintain the `perishable` / `non-perishable` mapping directly in Sheets. Save the mapping first, then apply it to update all rows in `prices`.</p>
      </section>

      <section class="card stats">
        <div class="stat">
          <div class="stat-label">Unique Commodities</div>
          <div class="stat-value" id="totalCount">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Mapped</div>
          <div class="stat-value" id="mappedCount">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Unmapped</div>
          <div class="stat-value" id="unmappedCount">0</div>
        </div>
      </section>

      <section class="card toolbar">
        <input id="searchInput" type="search" placeholder="Search commodities">
        <div class="buttons">
          <button id="saveButton" type="button">Save Mapping</button>
          <button id="applyButton" type="button">Apply To Prices</button>
          <button id="refreshButton" class="secondary" type="button">Refresh</button>
        </div>
        <div class="status" id="status">Loading commodity list...</div>
      </section>

      <section class="card">
        <div class="badge">Mapping Sheet: commodity_mapping</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width: 60%;">Commodity</th>
                <th style="width: 40%;">Perishability</th>
              </tr>
            </thead>
            <tbody id="mappingBody"></tbody>
          </table>
        </div>
      </section>
    </div>

    <script>
      let state = {
        items: [],
        options: [],
        filteredItems: [],
      };

      const totalCountEl = document.getElementById("totalCount");
      const mappedCountEl = document.getElementById("mappedCount");
      const unmappedCountEl = document.getElementById("unmappedCount");
      const searchInputEl = document.getElementById("searchInput");
      const mappingBodyEl = document.getElementById("mappingBody");
      const statusEl = document.getElementById("status");
      const saveButtonEl = document.getElementById("saveButton");
      const applyButtonEl = document.getElementById("applyButton");
      const refreshButtonEl = document.getElementById("refreshButton");

      function setBusy(isBusy) {
        saveButtonEl.disabled = isBusy;
        applyButtonEl.disabled = isBusy;
        refreshButtonEl.disabled = isBusy;
      }

      function setStatus(message, tone) {
        statusEl.textContent = message;
        statusEl.className = "status" + (tone ? " " + tone : "");
      }

      function renderStats() {
        const mapped = state.items.filter((item) => item.perishability).length;
        totalCountEl.textContent = String(state.items.length);
        mappedCountEl.textContent = String(mapped);
        unmappedCountEl.textContent = String(state.items.length - mapped);
      }

      function renderTable() {
        const query = searchInputEl.value.trim().toLowerCase();
        const items = query
          ? state.items.filter((item) => item.commodity.toLowerCase().includes(query))
          : state.items.slice();

        state.filteredItems = items;
        mappingBodyEl.innerHTML = "";

        if (items.length === 0) {
          const row = document.createElement("tr");
          const cell = document.createElement("td");
          cell.colSpan = 2;
          cell.textContent = "No commodities match the current search.";
          row.appendChild(cell);
          mappingBodyEl.appendChild(row);
          return;
        }

        items.forEach((item) => {
          const row = document.createElement("tr");

          const commodityCell = document.createElement("td");
          commodityCell.textContent = item.commodity;
          row.appendChild(commodityCell);

          const mappingCell = document.createElement("td");
          const select = document.createElement("select");
          const emptyOption = document.createElement("option");
          emptyOption.value = "";
          emptyOption.textContent = "Select...";
          select.appendChild(emptyOption);

          state.options.forEach((option) => {
            const optionEl = document.createElement("option");
            optionEl.value = option;
            optionEl.textContent = option;
            if (item.perishability === option) {
              optionEl.selected = true;
            }
            select.appendChild(optionEl);
          });

          select.addEventListener("change", () => {
            item.perishability = select.value;
            renderStats();
          });

          mappingCell.appendChild(select);
          row.appendChild(mappingCell);
          mappingBodyEl.appendChild(row);
        });
      }

      function loadData() {
        setBusy(true);
        setStatus("Loading commodity list...");
        google.script.run
          .withSuccessHandler((payload) => {
            state.items = payload.items || [];
            state.options = payload.options || [];
            renderStats();
            renderTable();
            setStatus("Mapping loaded. Save any changes, then apply them to prices.");
            setBusy(false);
          })
          .withFailureHandler((error) => {
            setStatus(error.message || String(error), "warn");
            setBusy(false);
          })
          .getCommodityMappingManagerData();
      }

      function saveMappings() {
        setBusy(true);
        setStatus("Saving commodity mapping...");
        google.script.run
          .withSuccessHandler((result) => {
            setStatus("Saved " + result.savedCount + " mapped commodities.", "success");
            setBusy(false);
            loadData();
          })
          .withFailureHandler((error) => {
            setStatus(error.message || String(error), "warn");
            setBusy(false);
          })
          .saveCommodityMappings({ items: state.items });
      }

      function applyMappings() {
        setBusy(true);
        setStatus("Applying mapping to prices...");
        google.script.run
          .withSuccessHandler((result) => {
            setStatus(
              "Applied mapping to prices.\n" +
              "Updated rows: " + result.updatedCount + "\n" +
              "Unchanged rows: " + result.unchangedCount + "\n" +
              "Rows still unmapped: " + result.unmappedCount,
              "success"
            );
            setBusy(false);
          })
          .withFailureHandler((error) => {
            setStatus(error.message || String(error), "warn");
            setBusy(false);
          })
          .applyCommodityMappings();
      }

      searchInputEl.addEventListener("input", renderTable);
      saveButtonEl.addEventListener("click", saveMappings);
      applyButtonEl.addEventListener("click", applyMappings);
      refreshButtonEl.addEventListener("click", loadData);

      loadData();
    </script>
  </body>
</html>
